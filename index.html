<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Pages Maker - Список лендингов</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 60px;
        }

        .header h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .landing-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .landing-card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .landing-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .landing-card h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.5rem;
        }

        .landing-card p {
            color: #666;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .landing-card .btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.3s ease;
        }

        .landing-card .btn:hover {
            opacity: 0.9;
        }

        .stats {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 30px;
            color: white;
            text-align: center;
        }

        .stats h2 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .footer {
            text-align: center;
            color: white;
            margin-top: 60px;
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }

            .landing-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Landing Pages Maker</h1>
            <p>Все ваши лендинги в одном месте</p>
        </div>

        <div class="landing-grid" id="landingGrid">
            <!-- Лендинги будут добавлены автоматически -->
        </div>

        <div class="stats">
            <h2 id="landingCount">0</h2>
            <p>Активных лендингов</p>
        </div>

        <div class="footer">
            <p>Автоматически деплоится на GitHub Pages и Cloudflare Pages</p>
        </div>
    </div>

    <script>
        const landings = [
            {
                title: 'Оптимизированный лендинг 2026',
                description: 'Современный и оптимизированный лендинг с быстрой загрузкой и отличной конверсией.',
                file: 'optimized-landing-2026.html'
            },
            {
                title: 'Страница благодарности 2026',
                description: 'Thank you page для подтверждения действий пользователей.',
                file: 'thank-you-page-2026.html'
            },
            {
                title: 'Промо страница',
                description: 'Промо-лендинг для специальных предложений и акций.',
                file: 'promo.html'
            },
            {
                title: 'Приложение',
                description: 'Интерактивное веб-приложение.',
                file: 'app.html'
            }
        ];

        const grid = document.getElementById('landingGrid');
        const countElement = document.getElementById('landingCount');

        landings.forEach(landing => {
            const card = document.createElement('div');
            card.className = 'landing-card';
            card.innerHTML = `
                <h3>${landing.title}</h3>
                <p>${landing.description}</p>
                <a href="${landing.file}" class="btn">Открыть лендинг →</a>
            `;
            grid.appendChild(card);
        });

        countElement.textContent = landings.length;
    </script>
</body>
</html>
